<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — CrisisTrainer</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>

    .reset-wrapper{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }

    .reset-card{
      width:100%;
      max-width:480px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:.4rem;
      margin-bottom:1rem;
      color:var(--c-accent);
      font-weight:600;
    }

    .reset-title{
      margin-bottom:.3rem;
    }

    .reset-sub{
      color:var(--text-muted);
      margin-bottom:1.5rem;
    }

  </style>
</head>
<body>

<div class="reset-wrapper">

  <div class="card reset-card">

    <a href="login.html" class="back-link">
      ← Back to Login
    </a>

    <h1 class="reset-title">Reset Password</h1>

    <p class="reset-sub">
      Enter your email and create a new password.
    </p>

    <div id="resetAlert" class="alert" style="display:none;"></div>

    <form id="resetForm">

      <div class="form-group">
        <label class="form-label">Email Address</label>

        <input type="email"
               id="resetEmail"
               class="form-control"
               placeholder="you@hospital.com"
               required />
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>

        <input type="password"
               id="resetPassword"
               class="form-control"
               placeholder="Min. 6 characters"
               required />
      </div>

      <button type="submit"
              id="resetBtn"
              class="btn btn-primary w-100 btn-lg">
        Reset Password
      </button>

    </form>

  </div>

</div>

<script src="js/api.js"></script>

<script>

const resetForm = document.getElementById("resetForm");

resetForm.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email =
    document.getElementById("resetEmail").value.trim();

  const newPassword =
    document.getElementById("resetPassword").value;

  const btn =
    document.getElementById("resetBtn");

  clearAlerts();

  if (!email || !newPassword) {

    showAlert(
      "Please fill in all fields.",
      "error"
    );

    return;
  }

  if (newPassword.length < 6) {

    showAlert(
      "Password must be at least 6 characters.",
      "error"
    );

    return;
  }

  setLoading(btn, true);

  try {

    await apiResetPassword(email, newPassword);

    showAlert(
      "Password reset successfully. Redirecting to login...",
      "success"
    );

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {

    showAlert(err.message, "error");

  } finally {

    setLoading(btn, false);

  }

});

function showAlert(msg, type="error") {

  const el = document.getElementById("resetAlert");

  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = "flex";
}

function clearAlerts() {

  document.getElementById("resetAlert").style.display = "none";
}

function setLoading(btn, loading){

  if(loading){

    btn.dataset.original = btn.innerHTML;

    btn.innerHTML =
      '<span class="spinner"></span> Please wait...';

    btn.disabled = true;

  } else {

    btn.innerHTML = btn.dataset.original;

    btn.disabled = false;

  }

}

</script>

</body>
</html>
